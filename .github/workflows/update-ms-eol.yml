name: Update EOL Data

on:
  schedule:
    - cron: '0 9 * * 1'   # 매주 월요일 오전 9시 (UTC)
  workflow_dispatch:
    inputs:
      vendor:
        description: '수집 벤더 (microsoft / adobe / edge / all)'
        required: false
        default: 'all'

jobs:
  update-eol-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install selenium webdriver-manager requests

      - name: Install Chrome (for Adobe Selenium)
        uses: browser-actions/setup-chrome@v1

      - name: Run EOL data collector
        run: |
          python3 Generate_EOL_JSON.py \
            --vendor "${{ github.event.inputs.vendor || 'all' }}" \
            --output ./data

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "chore: update EOL data $(date +'%Y-%m-%d') [vendor=${{ github.event.inputs.vendor || 'all' }}]"
          git push

      - name: No changes detected
        if: steps.changes.outputs.changed != 'true'
        run: echo "데이터 변경 없음 - 커밋 생략"
