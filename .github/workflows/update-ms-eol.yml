name: Update Microsoft EOL Data

on:
  # 매주 월요일 오전 9시 (UTC) 자동 실행
  schedule:
    - cron: '0 9 * * 1'

  # 수동 실행 (GitHub UI에서 Run workflow 버튼)
  workflow_dispatch:
    inputs:
      product:
        description: '특정 제품만 업데이트 (비워두면 전체)'
        required: false
        default: ''

jobs:
  update-eol-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # 결과 파일을 repo에 커밋하기 위해 필요

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run EOL data collector
        run: |
          if [ -n "${{ github.event.inputs.product }}" ]; then
            python3 Generate_MS_Lifecycle_JSON.py \
              --output ./data \
              --product "${{ github.event.inputs.product }}"
          else
            python3 Generate_MS_Lifecycle_JSON.py --output ./data
          fi

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "chore: update MS lifecycle EOL data $(date +'%Y-%m-%d')"
          git push

      - name: No changes detected
        if: steps.changes.outputs.changed != 'true'
        run: echo "데이터 변경 없음 - 커밋 생략"
